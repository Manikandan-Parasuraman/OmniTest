name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install project
        run: |
          pip install -e ".[dev]"

      - name: Show Versions
        run: |
          python --version
          pip --version
          pylint --version
          ruff --version
          black --version
          pytest --version

      - name: Check formatting
        run: |
          black --check .

      - name: Ruff
        run: |
          ruff check .

      - name: Pylint
        run: |
          pylint $(git ls-files '*.py')

      - name: Run Tests
        run: |
          pytest

      - name: Build Package
        run: |
          python -m build